version: '3.8'
services:
  go-service:
    build: ./go-service
    ports:
      - "8080:8080"
    networks:
      - lab11-net

  python-service:
    build: ./python-service
    ports:
      - "8000:8000"
    depends_on:
      - go-service
    networks:
      - lab11-net

networks:
  lab11-net:
    driver: bridge